<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}顧客管理{% endblock %}</title>
  <!-- Bootstrap 5 (デザインを整えるライブラリ) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- アイコン -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: bold; font-size: 1.3rem; }
    .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
    .sidebar .nav-link { color: #495057; padding: 10px 20px; border-radius: 6px; margin: 2px 8px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9f0ff; color: #0d6efd; }
    .sidebar .nav-link i { margin-right: 8px; }
    .content-area { padding: 24px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .table th { background: #f1f3f5; }
    .badge-status-提案中 { background-color: #6c757d; }
    .badge-status-商談中 { background-color: #0d6efd; }
    .badge-status-受注    { background-color: #198754; }
    .badge-status-失注    { background-color: #dc3545; }
    .badge-status-完了    { background-color: #20c997; }
  </style>
</head>
<body>

<!-- ナビバー（上部） -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('customers') }}">
      <i class="bi bi-building"></i> 顧客管理
    </a>
    <div class="ms-auto d-flex align-items-center text-white">
      <i class="bi bi-person-circle me-1"></i>
      <span class="me-3">{{ session.username }}</span>
      <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">ログアウト</a>
    </div>
  </div>
</nav>

<div class="d-flex">

  <!-- サイドメニュー -->
  <div class="sidebar" style="width: 200px; flex-shrink: 0;">
    <nav class="nav flex-column pt-3">
      <a class="nav-link {% if request.endpoint == 'customers' %}active{% endif %}"
         href="{{ url_for('customers') }}">
        <i class="bi bi-people"></i> 顧客一覧
      </a>
      {% if session.role == 'admin' %}
      <a class="nav-link {% if request.endpoint == 'accounts' %}active{% endif %}"
         href="{{ url_for('accounts') }}">
        <i class="bi bi-shield-person"></i> アカウント管理
      </a>
      {% endif %}
    </nav>
  </div>

  <!-- メインコンテンツ -->
  <div class="content-area flex-grow-1">

    <!-- フラッシュメッセージ（操作結果の通知） -->
    {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
