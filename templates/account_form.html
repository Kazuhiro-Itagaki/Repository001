{% extends 'base.html' %}
{% block title %}アカウント作成{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3">
  <a href="{{ url_for('accounts') }}" class="btn btn-outline-secondary btn-sm me-2">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h5 class="mb-0">アカウント作成</h5>
</div>

<div class="card" style="max-width:400px;">
  <div class="card-body">
    <form method="POST">

      <div class="mb-3">
        <label class="form-label fw-bold">ユーザー名 <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">パスワード <span class="text-danger">*</span></label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <div class="mb-4">
        <label class="form-label">権限</label>
        <select name="role" class="form-select">
          <option value="user">一般ユーザー</option>
          <option value="admin">管理者</option>
        </select>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">作成する</button>
        <a href="{{ url_for('accounts') }}" class="btn btn-outline-secondary">キャンセル</a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
